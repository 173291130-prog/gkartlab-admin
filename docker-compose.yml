services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-painting-admin-app
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
      - uploads:/app/storage/uploads
      - generated:/app/storage/generated
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sqlite_data:
  uploads:
  generated:
